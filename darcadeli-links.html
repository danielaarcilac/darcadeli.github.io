<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #502C1E;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(244,197,92,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(220,94,54,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    width: 200px;
    margin-bottom: 16px;
    filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(340deg) brightness(1.08);
    opacity: 0.95;
  }

  .brand-sub {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #F9E8D1;
    opacity: 0.5;
    margin-bottom: 8px;
    margin-top: -8px;
  }

  .tagline {
    font-size: 14px;
    font-weight: 600;
    color: #F9E8D1;
    opacity: 0.7;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
  }

  .link-btn:nth-child(1) { animation-delay: 0.3s; }
  .link-btn:nth-child(2) { animation-delay: 0.5s; }

  .link-btn:active { transform: scale(0.97); }
  .link-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }

  .btn-instagram {
    background: linear-gradient(135deg, #DC5E36, #c94d2a);
    color: #F9E8D1;
    box-shadow: 0 6px 24px rgba(220,94,54,0.35);
  }

  .btn-whatsapp {
    background: #47763B;
    color: #F9E8D1;
    box-shadow: 0 6px 24px rgba(71,118,59,0.35);
  }

  .btn-icon {
    font-size: 26px;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .btn-label {
    font-size: 17px;
    font-weight: 900;
    line-height: 1;
  }

  .btn-handle {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.8;
    letter-spacing: 0.5px;
  }

  .footer {
    margin-top: 36px;
    font-size: 11px;
    color: #F9E8D1;
    opacity: 0.3;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: fadeUp 0.8s ease 0.7s forwards;
    opacity: 0;
  }
</style>
</head>
